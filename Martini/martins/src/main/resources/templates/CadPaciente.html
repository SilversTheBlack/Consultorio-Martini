<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <title>Cadastro de Paciente</title>
    <link rel="stylesheet" th:href="@{/CadPacienteStyle.css}" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" />
</head>

<body>

    <div class="wireframe-4-child">
    </div>
    <img class="logo-mm-2" alt="" src="/images/LOGO MM 2.png">
    <div class="wireframe-4-item">
    </div>
    <div class="usurio-doutora-michele">Usuário: Doutora Michele Martins </div>
    <div class="wireframe-4-inner">
    </div>
    <b class="pacientes">Pacientes</b>
    <a th:href="@{/}">
        <div class="rectangle-div" id="rectangle3">
        </div>
    </a>
    <a th:href="@{/}">
        <button class="pgina-inicial">Página Inicial</button>
        <img class="triangulo-png-3" alt="" src="/images/triangulo png 3.png">
        <img class="triangulo-png-4" alt="" src="/images/triangulo png 4.png">
    </a>
    <div class="wireframe-4-child1">
    </div>
    <form th:action="@{/cliente/salvar}" th:object="${cliente}" method="post" class="patient-form">
        <input type="hidden" th:field="*{id}" />
        <!-- Nome do Paciente -->
        <input type="text" class="wireframe-4-child2" th:field="*{nome}" placeholder="Nome do Paciente">
        <!-- Celular -->
        <input type="text" class="wireframe-4-child4" th:field="*{telefone}">
        <!-- CPF -->
        <input type="text" class="wireframe-4-child11" th:field="*{cpf}">
        <!-- Cep -->
        <input type="text" class="wireframe-4-child22" th:field="*{cep}">
        <!-- Observações -->
        <input type="text" class="wireframe-4-child5" th:field="*{obs}">

        <div class="wireframe-4-child7"></div>
        <div class="wireframe-4-child8"></div>
        <div class="cadastro">Cadastro</div>
        <b class="novo-paciente">Novo Paciente</b>
        <!-- Botão De Submit -->
        <div class="wireframe-4-child9" id="rectangle12">
        </div>
        <div class="wireframe-4-child10">
        </div>
        <button type="submit" class="salvar">Salvar</button>
    </form>
    <b class="cancelar">Cancelar</b>
    <div class="nome-do-paciente-container">
        <p class="nome-do-paciente">Nome do Paciente</p>
    </div>
    <div class="celular">Celular:</div>
    <div class="Cep">Cep:</div>
    <div class="observaes">Observações:</div>
    <div class="cpf">CPF:</div>
    <a th:href="@{/clientes/listar} ">
        <div class="ficha-pessoal" id="fichaPessoalText">Ficha pessoal</div>
    </a>








    <script>
        var rectangle3 = document.getElementById("rectangle3");
        if (rectangle3) {
            rectangle3.addEventListener("click", function (e) {
                // Add your code here
            });
        }

        var rectangle12 = document.getElementById("rectangle12");
        if (rectangle12) {
            rectangle12.addEventListener("click", function (e) {
                // Add your code here
            });
        }

        var fichaPessoalText = document.getElementById("fichaPessoalText");
        if (fichaPessoalText) {
            fichaPessoalText.addEventListener("click", function (e) {
                // Add your code here
            });
        }</script>
</body>

</html>
